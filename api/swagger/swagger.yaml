basePath: /api
definitions:
  internal_handlers.Alert:
    properties:
      channels:
        description: 'Notification channels: "email", "webhook", "slack"'
        items:
          type: string
        type: array
      condition:
        $ref: '#/definitions/internal_handlers.AlertCondition'
      cooldown:
        $ref: '#/definitions/time.Duration'
      created_at:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      last_trigger:
        type: string
      name:
        type: string
      severity:
        $ref: '#/definitions/internal_handlers.AlertSeverity'
      trigger_count:
        type: integer
      updated_at:
        type: string
    type: object
  internal_handlers.AlertCondition:
    properties:
      consumer:
        description: Optional consumer filter
        type: string
      operator:
        description: '">", "<", "=", ">=", "<="'
        type: string
      stream:
        description: Optional stream filter
        type: string
      threshold:
        description: Threshold value
        type: integer
      type:
        description: '"lag", "latency", "messages", "consumer_lag", "storage"'
        type: string
    type: object
  internal_handlers.AlertSeverity:
    enum:
    - info
    - warning
    - critical
    type: string
    x-enum-varnames:
    - SeverityInfo
    - SeverityWarning
    - SeverityCritical
  internal_handlers.AlertTrigger:
    properties:
      acked:
        type: boolean
      acked_at:
        type: string
      acked_by:
        type: string
      alert_id:
        type: string
      alert_name:
        type: string
      data:
        additionalProperties: true
        type: object
      message:
        type: string
      severity:
        $ref: '#/definitions/internal_handlers.AlertSeverity'
      triggered_at:
        type: string
    type: object
  internal_handlers.ConnectionConfig:
    properties:
      created_at:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      is_default:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  internal_handlers.MetricDataPoint:
    properties:
      label:
        type: string
      timestamp:
        type: integer
      value:
        type: number
    type: object
  internal_handlers.MetricSeries:
    properties:
      data:
        items:
          $ref: '#/definitions/internal_handlers.MetricDataPoint'
        type: array
      labels:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
    type: object
  internal_handlers.MetricsResponse:
    properties:
      consumers:
        items:
          $ref: '#/definitions/internal_handlers.MetricSeries'
        type: array
      streams:
        items:
          $ref: '#/definitions/internal_handlers.MetricSeries'
        type: array
      system:
        items:
          $ref: '#/definitions/internal_handlers.MetricSeries'
        type: array
      timestamp:
        type: integer
    type: object
  internal_handlers.User:
    properties:
      account:
        type: string
      created_at:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      permissions:
        $ref: '#/definitions/internal_handlers.UserPermissions'
      updated_at:
        type: string
    type: object
  internal_handlers.UserPermissions:
    properties:
      publish:
        additionalProperties:
          type: string
        type: object
      subscribe:
        additionalProperties:
          type: string
        type: object
    type: object
  nats-monitoring_internal_dto.AckMessageRequest:
    properties:
      sequence:
        type: integer
    required:
    - sequence
    type: object
  nats-monitoring_internal_dto.AckMessageResponse:
    properties:
      message:
        type: string
      sequence:
        type: integer
    type: object
  nats-monitoring_internal_dto.AckTermMessageRequest:
    properties:
      sequence:
        type: integer
    required:
    - sequence
    type: object
  nats-monitoring_internal_dto.ClusterConnectedServer:
    properties:
      id:
        type: string
      url:
        type: string
    type: object
  nats-monitoring_internal_dto.ClusterHealthResponse:
    properties:
      connected:
        type: boolean
      connected_server:
        $ref: '#/definitions/nats-monitoring_internal_dto.ClusterConnectedServer'
      jetstream:
        $ref: '#/definitions/nats-monitoring_internal_dto.ClusterJetStreamHealth'
      server_status:
        type: string
      status:
        type: string
    type: object
  nats-monitoring_internal_dto.ClusterInfoPeerResponse:
    properties:
      active:
        type: integer
      current:
        type: boolean
      lag:
        type: integer
      name:
        type: string
      offline:
        type: boolean
    type: object
  nats-monitoring_internal_dto.ClusterInfoResponse:
    properties:
      cluster_name:
        type: string
      cluster_url:
        type: string
      is_clustered:
        type: boolean
      jetstream:
        $ref: '#/definitions/nats-monitoring_internal_dto.ClusterJetStreamInfo'
      server_name:
        type: string
    type: object
  nats-monitoring_internal_dto.ClusterJetStreamHealth:
    properties:
      domain:
        type: string
      error:
        type: string
      status:
        type: string
      tiers: {}
    type: object
  nats-monitoring_internal_dto.ClusterJetStreamInfo:
    properties:
      api_level:
        type: string
      domain:
        type: string
      enabled:
        type: boolean
      tier:
        type: string
    type: object
  nats-monitoring_internal_dto.ClusterNodeResponse:
    properties:
      active:
        type: boolean
      current:
        type: boolean
      healthy:
        type: boolean
      id:
        type: string
      lag:
        type: integer
      name:
        type: string
    type: object
  nats-monitoring_internal_dto.ClusterNodesResponse:
    properties:
      cluster_name:
        type: string
      clustered:
        type: boolean
      nodes:
        items:
          $ref: '#/definitions/nats-monitoring_internal_dto.ClusterNodeResponse'
        type: array
    type: object
  nats-monitoring_internal_dto.ClusterPlacementResponse:
    properties:
      cluster:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  nats-monitoring_internal_dto.ClusterStreamClusterResponse:
    properties:
      leader:
        type: string
      leader_since:
        type: string
      name:
        type: string
      raft_group:
        type: string
      replicas:
        items:
          $ref: '#/definitions/nats-monitoring_internal_dto.ClusterInfoPeerResponse'
        type: array
      system_account:
        type: boolean
      traffic_account:
        type: string
    type: object
  nats-monitoring_internal_dto.ClusterStreamReplicaResponse:
    properties:
      cluster:
        $ref: '#/definitions/nats-monitoring_internal_dto.ClusterStreamClusterResponse'
      is_clustered:
        type: boolean
      mirror:
        $ref: '#/definitions/nats-monitoring_internal_dto.ClusterStreamSource'
      placement:
        $ref: '#/definitions/nats-monitoring_internal_dto.ClusterPlacementResponse'
      replicas:
        type: integer
      sources:
        items:
          $ref: '#/definitions/nats-monitoring_internal_dto.ClusterStreamSource'
        type: array
      stream:
        type: string
    type: object
  nats-monitoring_internal_dto.ClusterStreamSource:
    properties:
      domain:
        type: string
      name:
        type: string
    type: object
  nats-monitoring_internal_dto.ConnectionInfo:
    properties:
      cid:
        type: integer
      connected_at:
        type: string
      ip:
        type: string
      last_activity:
        type: string
      name:
        type: string
      server:
        type: string
      subs_count:
        type: integer
      type:
        type: string
      user:
        type: string
    type: object
  nats-monitoring_internal_dto.ConnectionsResponse:
    properties:
      connections:
        items:
          $ref: '#/definitions/nats-monitoring_internal_dto.ConnectionInfo'
        type: array
      total:
        type: integer
    type: object
  nats-monitoring_internal_dto.ConsumerConfigResponse:
    properties:
      ack_policy:
        type: string
      deliver_policy:
        type: string
      durable:
        type: string
      max_deliver:
        type: integer
      replay_policy:
        type: string
    type: object
  nats-monitoring_internal_dto.ConsumerResponse:
    properties:
      ack_rate:
        type: string
      config:
        $ref: '#/definitions/nats-monitoring_internal_dto.ConsumerConfigResponse'
      lag:
        type: integer
      name:
        type: string
      num_pending:
        type: integer
      paused:
        type: boolean
      status:
        type: string
      stream:
        type: string
    type: object
  nats-monitoring_internal_dto.CreateConsumerRequest:
    properties:
      ack_policy:
        enum:
        - none
        - all
        - explicit
        type: string
      deliver_policy:
        enum:
        - all
        - last
        - new
        type: string
      durable:
        type: string
      filter_subject:
        type: string
      max_deliver:
        minimum: -1
        type: integer
      name:
        type: string
      replay_policy:
        enum:
        - instant
        - original
        type: string
    required:
    - name
    type: object
  nats-monitoring_internal_dto.CreateStreamRequest:
    properties:
      max_age:
        type: string
      max_bytes:
        type: integer
      name:
        type: string
      replicas:
        maximum: 5
        minimum: 1
        type: integer
      retention:
        enum:
        - limits
        - interest
        - workqueue
        type: string
      storage:
        enum:
        - file
        - memory
        type: string
      subjects:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - name
    - storage
    - subjects
    type: object
  nats-monitoring_internal_dto.DashboardStatsResponse:
    properties:
      bytes:
        type: integer
      connections:
        type: integer
      consumers:
        type: integer
      messages:
        type: integer
      server_status:
        type: string
      streams:
        type: integer
    type: object
  nats-monitoring_internal_dto.ErrorResponse:
    properties:
      code:
        type: string
      details:
        type: string
      error:
        type: string
    type: object
  nats-monitoring_internal_dto.HealthResponse:
    properties:
      nats:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  nats-monitoring_internal_dto.KVBucketCreateResponse:
    properties:
      history:
        type: integer
      name:
        type: string
      values:
        type: integer
    type: object
  nats-monitoring_internal_dto.KVBucketDeleteResponse:
    properties:
      message:
        type: string
      name:
        type: string
    type: object
  nats-monitoring_internal_dto.KVBucketInfo:
    properties:
      bucket_name:
        type: string
      bytes:
        type: integer
      name:
        type: string
      values:
        type: integer
    type: object
  nats-monitoring_internal_dto.KVKeyDeleteResponse:
    properties:
      key:
        type: string
      message:
        type: string
    type: object
  nats-monitoring_internal_dto.KVKeyEntry:
    properties:
      created:
        type: string
      key:
        type: string
      revision:
        type: integer
      value:
        type: string
    type: object
  nats-monitoring_internal_dto.KVKeyHistoryEntry:
    properties:
      created:
        type: string
      key:
        type: string
      operation:
        type: string
      revision:
        type: integer
      value:
        type: string
    type: object
  nats-monitoring_internal_dto.KVKeyPutResponse:
    properties:
      key:
        type: string
      message:
        type: string
    type: object
  nats-monitoring_internal_dto.KVPurgeResponse:
    properties:
      message:
        type: string
      name:
        type: string
    type: object
  nats-monitoring_internal_dto.MessageResponse:
    properties:
      data:
        type: string
      headers:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      sequence:
        type: integer
      subject:
        type: string
      timestamp:
        type: string
    type: object
  nats-monitoring_internal_dto.NackMessageRequest:
    properties:
      delay:
        description: Redelivery delay in seconds
        type: integer
      sequence:
        type: integer
    required:
    - sequence
    type: object
  nats-monitoring_internal_dto.PendingMessage:
    properties:
      consumer:
        type: string
      data:
        type: string
      num_delivered:
        type: integer
      num_pending:
        type: integer
      sequence:
        type: integer
      stream:
        type: string
      subject:
        type: string
      timestamp:
        type: string
    type: object
  nats-monitoring_internal_dto.PendingMessagesResponse:
    properties:
      consumer:
        type: string
      messages:
        items:
          $ref: '#/definitions/nats-monitoring_internal_dto.PendingMessage'
        type: array
      num_ack_pending:
        type: integer
      num_pending:
        type: integer
      stream:
        type: string
    type: object
  nats-monitoring_internal_dto.PublishMessageRequest:
    properties:
      headers:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      payload:
        type: string
      reply_to:
        type: string
      subject:
        type: string
    required:
    - subject
    type: object
  nats-monitoring_internal_dto.PublishMessageResponse:
    properties:
      size:
        type: integer
      subject:
        type: string
      success:
        type: boolean
      timestamp:
        type: integer
    type: object
  nats-monitoring_internal_dto.PurgeStreamRequest:
    properties:
      sequence:
        type: integer
      subject:
        type: string
    type: object
  nats-monitoring_internal_dto.PurgeStreamResponse:
    properties:
      message:
        type: string
      remaining:
        type: integer
    type: object
  nats-monitoring_internal_dto.ReplayRequest:
    properties:
      end_seq:
        type: integer
      filter_subject:
        type: string
      start_seq:
        type: integer
    type: object
  nats-monitoring_internal_dto.ReplayResponse:
    properties:
      message:
        type: string
      replay_id:
        type: string
    type: object
  nats-monitoring_internal_dto.RequestMessageRequest:
    properties:
      headers:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      payload:
        type: string
      subject:
        type: string
      timeout:
        type: integer
    required:
    - subject
    type: object
  nats-monitoring_internal_dto.ResetLagRequest:
    properties:
      sequence:
        type: integer
    type: object
  nats-monitoring_internal_dto.ResetLagResponse:
    properties:
      message:
        type: string
      new_sequence:
        type: integer
    type: object
  nats-monitoring_internal_dto.ServiceDiscoveryResponse:
    properties:
      auth_required:
        type: boolean
      connected:
        type: boolean
      host:
        type: string
      max_payload:
        type: integer
      port:
        type: integer
      server_count:
        type: integer
      server_name:
        type: string
      server_url:
        type: string
      status:
        type: string
      tls_required:
        type: boolean
      version:
        type: string
    type: object
  nats-monitoring_internal_dto.StreamConfigResponse:
    properties:
      max_age:
        type: string
      max_bytes:
        type: integer
      name:
        type: string
      replicas:
        type: integer
      retention:
        type: string
      storage:
        type: string
      subjects:
        items:
          type: string
        type: array
    type: object
  nats-monitoring_internal_dto.StreamResponse:
    properties:
      config:
        $ref: '#/definitions/nats-monitoring_internal_dto.StreamConfigResponse'
      state:
        $ref: '#/definitions/nats-monitoring_internal_dto.StreamStateResponse'
    type: object
  nats-monitoring_internal_dto.StreamStateResponse:
    properties:
      bytes:
        type: integer
      consumers:
        type: integer
      delete_marks:
        type: integer
      first_seq:
        type: integer
      first_ts:
        type: string
      last_seq:
        type: integer
      last_ts:
        type: string
      messages:
        type: integer
      num_pending:
        type: integer
    type: object
  nats-monitoring_internal_dto.SubjectInfo:
    properties:
      count:
        type: integer
      last_seen:
        type: string
      name:
        type: string
    type: object
  nats-monitoring_internal_dto.SubjectsResponse:
    properties:
      subjects:
        items:
          $ref: '#/definitions/nats-monitoring_internal_dto.SubjectInfo'
        type: array
      total:
        type: integer
    type: object
  nats-monitoring_internal_dto.SubscriptionsResponse:
    properties:
      connected:
        type: boolean
      count:
        type: integer
      server:
        type: string
      status:
        type: string
    type: object
  nats-monitoring_internal_dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  nats-monitoring_internal_dto.UpdateConsumerRequest:
    properties:
      ack_policy:
        enum:
        - none
        - all
        - explicit
        type: string
      deliver_policy:
        enum:
        - all
        - last
        - new
        type: string
      max_deliver:
        minimum: -1
        type: integer
      replay_policy:
        enum:
        - instant
        - original
        type: string
    type: object
  nats-monitoring_internal_dto.UpdateStreamRequest:
    properties:
      max_age:
        type: string
      max_bytes:
        type: integer
      replicas:
        maximum: 5
        minimum: 1
        type: integer
      subjects:
        items:
          type: string
        type: array
    type: object
  time.Duration:
    enum:
    - -9223372036854775808
    - 9223372036854775807
    - 1
    - 1000
    - 1000000
    - 1000000000
    - 60000000000
    - 3600000000000
    format: int64
    type: integer
    x-enum-varnames:
    - minDuration
    - maxDuration
    - Nanosecond
    - Microsecond
    - Millisecond
    - Second
    - Minute
    - Hour
info:
  contact:
    name: NATS Monitoring Project
    url: http://github.com/nats-monitoring
  description: Comprehensive API for monitoring and managing NATS JetStream instances.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: NATS Monitoring API
  version: "1.0"
paths:
  /account/info:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: Account information
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ErrorResponse'
      summary: Get JetStream account information
      tags:
      - health
  /alerts:
    get:
      description: Returns all configured alert definitions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.Alert'
            type: array
      summary: List alerts
      tags:
      - alerts
    post:
      consumes:
      - application/json
      description: Creates a new alert configuration
      parameters:
      - description: Alert configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.Alert'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.Alert'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ErrorResponse'
      summary: Create an alert
      tags:
      - alerts
  /alerts/{id}:
    delete:
      description: Deletes an alert configuration by ID
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.SuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ErrorResponse'
      summary: Delete an alert
      tags:
      - alerts
    get:
      description: Returns a single alert configuration by ID
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.Alert'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ErrorResponse'
      summary: Get an alert
      tags:
      - alerts
    put:
      consumes:
      - application/json
      description: Updates an existing alert configuration
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      - description: Alert configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.Alert'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.Alert'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ErrorResponse'
      summary: Update an alert
      tags:
      - alerts
  /alerts/triggers:
    get:
      description: Returns triggered alert instances, optionally filtered
      parameters:
      - description: Filter by alert ID
        in: query
        name: alert_id
        type: string
      - description: Filter by acked state (true/false)
        in: query
        name: acked
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.AlertTrigger'
            type: array
      summary: List alert triggers
      tags:
      - alerts
  /alerts/triggers/{id}/ack:
    post:
      consumes:
      - application/json
      description: Acknowledges one or more triggers for the given alert ID
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: string
      - description: Acknowledging user
        in: body
        name: request
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.SuccessResponse'
      summary: Acknowledge an alert trigger
      tags:
      - alerts
  /cluster/health:
    get:
      description: Returns connection and JetStream health status of the cluster
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ClusterHealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ClusterHealthResponse'
      summary: Get cluster health
      tags:
      - cluster
  /cluster/info:
    get:
      description: Returns JetStream cluster topology and server information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ClusterInfoResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/nats-monitoring_internal_dto.ErrorResponse'
      summary: Get cluster information
      tags:
      - cluster
